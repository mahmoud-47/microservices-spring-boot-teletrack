server:
  port: 8082

spring:
  application:
    name: incident-service
  datasource:
    url: ${INCIDENT_DB_URL:jdbc:postgresql://localhost:5433/incidents_db}
    username: ${INCIDENT_DB_USERNAME:postgres}
    password: ${INCIDENT_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
