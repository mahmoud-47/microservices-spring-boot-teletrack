server:
  port: 8084

spring:
  application:
    name: reporting-service
  datasource:
    url: ${REPORTING_DB_URL:jdbc:postgresql://localhost:5433/reporting_db}
    username: ${REPORTING_DB_USERNAME:postgres}
    password: ${REPORTING_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
