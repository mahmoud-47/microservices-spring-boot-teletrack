spring:
  mvc:
    dispatch-options-request: true

jwt:
  secret: ${JWT_SECRET:207c11ed092814462f1c6f5713f747770183a6513f8558cfbcbff824a2ba0820} # dev secret
  access-token:
    expiration: 3600000
  refresh-token:
    expiration: 2592000000

app:
  frontend:
    url: ${FRONT_URL:http://localhost:3000}
  base-url: ${BACK_URL:http://localhost:8080}

# Logging Configuration
logging:
  level:
    com.teletrack: DEBUG
    org.springframework.security: DEBUG
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# observability
management:
  endpoints:
    web:
      exposure:
        # Include all common endpoints here
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    otlp:
      tracing:
        endpoint: http://host.docker.internal:4318/v1/traces
        transport: http