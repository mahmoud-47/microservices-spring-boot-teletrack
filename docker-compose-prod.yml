networks:
  teletrack-net:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  grafana-data:
  prometheus-data:
  elasticsearch-data:

services:

  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    pull_policy: always
    container_name: teletrack-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deployment/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - teletrack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    pull_policy: always
    container_name: teletrack-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongo-data:/data/db
    networks:
      - teletrack-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    pull_policy: always
    container_name: teletrack-redis
    volumes:
      - redis-data:/data
    networks:
      - teletrack-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    pull_policy: always
    container_name: teletrack-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - teletrack-net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | timeout 2 bash -c 'cat > /dev/tcp/localhost/2181' && echo ok"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    pull_policy: always
    container_name: teletrack-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - teletrack-net
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 15s
      retries: 8
      start_period: 30s

  jaeger:
    image: jaegertracing/all-in-one:1.56
    pull_policy: always
    container_name: teletrack-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    networks:
      - teletrack-net

  prometheus:
    image: prom/prometheus:v2.51.0
    pull_policy: always
    container_name: teletrack-prometheus
    volumes:
      - ./deployment/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - teletrack-net

  grafana:
    image: grafana/grafana:10.4.0
    pull_policy: always
    container_name: teletrack-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - teletrack-net

  elasticsearch:
    image: elasticsearch:8.13.0
    pull_policy: always
    container_name: teletrack-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - teletrack-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  logstash:
    image: logstash:8.13.0
    pull_policy: always
    container_name: teletrack-logstash
    volumes:
      - ./deployment/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    environment:
      - LS_JAVA_OPTS=${LS_JAVA_OPTS}
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - teletrack-net

  kibana:
    image: kibana:8.13.0
    pull_policy: always
    container_name: teletrack-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - teletrack-net

  # ─────────────────────────────────────────────
  # SERVICE DISCOVERY (no config dependency)
  # ─────────────────────────────────────────────

  discovery-service:
    image: mahmoudmhd47/teletrack-ms-discovery:latest
    pull_policy: always
    container_name: teletrack-discovery
    environment:
      TRACING_URL: http://jaeger:4317
    ports:
      - "8761:8761"
    networks:
      - teletrack-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8

  # ─────────────────────────────────────────────
  # CONFIG SERVER (depends on discovery)
  # ─────────────────────────────────────────────

  config-service:
    image: mahmoudmhd47/teletrack-ms-config:latest
    pull_policy: always
    container_name: teletrack-config
    depends_on:
      discovery-service:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      TRACING_URL: http://jaeger:4317
    ports:
      - "8888:8888"
    networks:
      - teletrack-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8

  # ─────────────────────────────────────────────
  # AI SERVICE (Python — no Eureka/Config)
  # ─────────────────────────────────────────────

  ai-service:
    image: mahmoudmhd47/teletrack-ms-ai-service:latest
    pull_policy: always
    container_name: teletrack-ai-service
    ports:
      - "8085:8085"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - teletrack-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────
  # SPRING BOOT MICROSERVICES
  # ─────────────────────────────────────────────

  user-service:
    image: mahmoudmhd47/teletrack-ms-user-service:latest
    pull_policy: always
    container_name: teletrack-user-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-service:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      USER_DB_URL: jdbc:postgresql://postgres:5432/users_db
      USER_DB_USERNAME: postgres
      USER_DB_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TRACING_URL: http://jaeger:4317
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_SERVICE_KEY: ${GATEWAY_SERVICE_KEY}
      INCIDENT-SERVICE-API-KEY: ${INCIDENT_SERVICE_API_KEY}
      HIKARI_MAX_POOL_SIZE: ${HIKARI_MAX_POOL_SIZE}
      HIKARI_MIN_IDLE: ${HIKARI_MIN_IDLE}
      HIKARI_IDLE_TIMEOUT: ${HIKARI_IDLE_TIMEOUT}
      HIKARI_CONNECTION_TIMEOUT: ${HIKARI_CONNECTION_TIMEOUT}
      HIKARI_MAX_LIFETIME: ${HIKARI_MAX_LIFETIME}
      HIKARI_LEAK_DETECTION_THRESHOLD: ${HIKARI_LEAK_DETECTION_THRESHOLD}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS}
      TOMCAT_MIN_SPARE_THREADS: ${TOMCAT_MIN_SPARE_THREADS}
      TOMCAT_ACCEPT_COUNT: ${TOMCAT_ACCEPT_COUNT}
      TOMCAT_MAX_CONNECTIONS: ${TOMCAT_MAX_CONNECTIONS}
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
    networks:
      - teletrack-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8

  incident-service:
    image: mahmoudmhd47/teletrack-ms-incident-service:latest
    pull_policy: always
    container_name: teletrack-incident-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-service:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      INCIDENT_DB_URL: jdbc:postgresql://postgres:5432/incidents_db
      INCIDENT_DB_USERNAME: postgres
      INCIDENT_DB_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TRACING_URL: http://jaeger:4317
      JWT_SECRET: ${JWT_SECRET}
      INCIDENT-SERVICE-API-KEY: ${INCIDENT_SERVICE_API_KEY}
      HIKARI_MAX_POOL_SIZE: ${HIKARI_MAX_POOL_SIZE}
      HIKARI_MIN_IDLE: ${HIKARI_MIN_IDLE}
      HIKARI_IDLE_TIMEOUT: ${HIKARI_IDLE_TIMEOUT}
      HIKARI_CONNECTION_TIMEOUT: ${HIKARI_CONNECTION_TIMEOUT}
      HIKARI_MAX_LIFETIME: ${HIKARI_MAX_LIFETIME}
      HIKARI_LEAK_DETECTION_THRESHOLD: ${HIKARI_LEAK_DETECTION_THRESHOLD}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS}
      TOMCAT_MIN_SPARE_THREADS: ${TOMCAT_MIN_SPARE_THREADS}
      TOMCAT_ACCEPT_COUNT: ${TOMCAT_ACCEPT_COUNT}
      TOMCAT_MAX_CONNECTIONS: ${TOMCAT_MAX_CONNECTIONS}
      FEIGN_CB_ENABLED: ${FEIGN_CB_ENABLED}
      CB_SLIDING_WINDOW_SIZE: ${CB_SLIDING_WINDOW_SIZE}
      CB_MIN_CALLS: ${CB_MIN_CALLS}
      CB_FAILURE_RATE_THRESHOLD: ${CB_FAILURE_RATE_THRESHOLD}
      CB_WAIT_DURATION_OPEN_STATE: ${CB_WAIT_DURATION_OPEN_STATE}
      CB_HALF_OPEN_PERMITTED_CALLS: ${CB_HALF_OPEN_PERMITTED_CALLS}
      CB_SLOW_CALL_DURATION_THRESHOLD: ${CB_SLOW_CALL_DURATION_THRESHOLD}
      CB_SLOW_CALL_RATE_THRESHOLD: ${CB_SLOW_CALL_RATE_THRESHOLD}
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
    networks:
      - teletrack-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8

  notification-service:
    image: mahmoudmhd47/teletrack-ms-notification-service:latest
    pull_policy: always
    container_name: teletrack-notification-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-service:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      NOTIFICATION_DB_URL: jdbc:postgresql://postgres:5432/notification_db
      NOTIFICATION_DB_USERNAME: postgres
      NOTIFICATION_DB_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TRACING_URL: http://jaeger:4317
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      HIKARI_MAX_POOL_SIZE: ${HIKARI_MAX_POOL_SIZE}
      HIKARI_MIN_IDLE: ${HIKARI_MIN_IDLE}
      HIKARI_IDLE_TIMEOUT: ${HIKARI_IDLE_TIMEOUT}
      HIKARI_CONNECTION_TIMEOUT: ${HIKARI_CONNECTION_TIMEOUT}
      HIKARI_MAX_LIFETIME: ${HIKARI_MAX_LIFETIME}
      HIKARI_LEAK_DETECTION_THRESHOLD: ${HIKARI_LEAK_DETECTION_THRESHOLD}
      EXECUTOR_CORE_SIZE: ${EXECUTOR_CORE_SIZE}
      EXECUTOR_MAX_SIZE: ${EXECUTOR_MAX_SIZE}
      EXECUTOR_QUEUE_CAPACITY: ${EXECUTOR_QUEUE_CAPACITY}
      EXECUTOR_KEEP_ALIVE: ${EXECUTOR_KEEP_ALIVE}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS}
      TOMCAT_MIN_SPARE_THREADS: ${TOMCAT_MIN_SPARE_THREADS}
      TOMCAT_ACCEPT_COUNT: ${TOMCAT_ACCEPT_COUNT}
      TOMCAT_MAX_CONNECTIONS: ${TOMCAT_MAX_CONNECTIONS}
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
    networks:
      - teletrack-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8

  reporting-service:
    image: mahmoudmhd47/teletrack-ms-reporting-service:latest
    pull_policy: always
    container_name: teletrack-reporting-service
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-service:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      MONGO_USERNAME: admin
      MONGO_PASSWORD: admin
      MONGO_HOST: mongo
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AI_SERVICE_URL: http://ai-service:8085
      TRACING_URL: http://jaeger:4317
      JWT_SECRET: ${JWT_SECRET}
      EXECUTOR_CORE_SIZE: ${EXECUTOR_CORE_SIZE}
      EXECUTOR_MAX_SIZE: ${EXECUTOR_MAX_SIZE}
      EXECUTOR_QUEUE_CAPACITY: ${EXECUTOR_QUEUE_CAPACITY}
      EXECUTOR_KEEP_ALIVE: ${EXECUTOR_KEEP_ALIVE}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS}
      TOMCAT_MIN_SPARE_THREADS: ${TOMCAT_MIN_SPARE_THREADS}
      TOMCAT_ACCEPT_COUNT: ${TOMCAT_ACCEPT_COUNT}
      TOMCAT_MAX_CONNECTIONS: ${TOMCAT_MAX_CONNECTIONS}
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
    networks:
      - teletrack-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8

  # ─────────────────────────────────────────────
  # API GATEWAY (last — depends on everything)
  # ─────────────────────────────────────────────

  api-gateway:
    image: mahmoudmhd47/teletrack-ms-gateway:latest
    pull_policy: always
    container_name: teletrack-gateway
    depends_on:
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      incident-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      reporting-service:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-service:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TRACING_URL: http://jaeger:4317
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_SERVICE_KEY: ${GATEWAY_SERVICE_KEY}
      FRONT_URL: ${FRONT_URL:-http://localhost:3000}
      BACK_URL: http://api-gateway:8080
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
    ports:
      - "8080:8080"
    networks:
      - teletrack-net