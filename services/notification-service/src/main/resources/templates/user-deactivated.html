<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Account Deactivated</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4;">
<div style="max-width: 600px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 5px;">
    <h2 style="color: #333;">Account Deactivated</h2>

    <p>Your account has been deactivated.</p>

    <p>Reason: <span th:text="${reason}"></span></p>

    <p>If you believe this is an error, please contact the administrator.</p>

    <p>Best regards,<br>TeleTrack360 Team</p>
</div>
</body>
</html>
