spring:
  application:
    name: incident-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE}
      minimum-idle: ${HIKARI_MIN_IDLE}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT}
      max-lifetime: ${HIKARI_MAX_LIFETIME}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION_THRESHOLD}
  cloud:
    openfeign:
      circuitbreaker:
        enabled: ${FEIGN_CB_ENABLED}
        group:
          enabled: true

server:
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS}
    accept-count: ${TOMCAT_ACCEPT_COUNT}
    max-connections: ${TOMCAT_MAX_CONNECTIONS}

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        sliding-window-size: ${CB_SLIDING_WINDOW_SIZE}
        minimum-number-of-calls: ${CB_MIN_CALLS}
        failure-rate-threshold: ${CB_FAILURE_RATE_THRESHOLD}
        wait-duration-in-open-state: ${CB_WAIT_DURATION_OPEN_STATE}
        permitted-number-of-calls-in-half-open-state: ${CB_HALF_OPEN_PERMITTED_CALLS}
        slow-call-duration-threshold: ${CB_SLOW_CALL_DURATION_THRESHOLD}
        slow-call-rate-threshold: ${CB_SLOW_CALL_RATE_THRESHOLD}
