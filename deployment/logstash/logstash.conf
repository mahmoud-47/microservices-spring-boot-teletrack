input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  mutate {
    remove_field => ["host", "port"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "teletrack-%{[service]}-%{+YYYY.MM.dd}"
  }
}
