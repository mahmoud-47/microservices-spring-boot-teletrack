name: TeleTrack360 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Verify
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Automatically caches dependencies to speed up subsequent runs

      # 3. Parallel Build & Test
      - name: Build with Maven
        run: mvn -B clean verify -T 1C

      # 4. Archive the Coverage Dashboard
      # This allows reviewers to download the JaCoCo report as a ZIP file
      - name: Upload Test Coverage Report
        if: always() # Ensures the report is uploaded even if a test fails
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: reports/aggregate-report/target/site/jacoco-aggregate/
          retention-days: 5