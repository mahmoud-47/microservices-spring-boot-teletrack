name: TeleTrack360 CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build, Test and Scan
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java 21 (Temurin distribution)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Automatically caches your dependencies to make builds faster

      # 3. Compile, Run Tests, and Run Static Analysis
      # 'verify' runs unit tests, integration tests, SpotBugs, and JaCoCo reports
      - name: Build with Maven
        run: mvn -B clean verify

      # 4. Upload the Aggregate Coverage Report
      # This allows you to download the "Big Dashboard" directly from GitHub
      - name: Upload JaCoCo Report
        if: always() # Upload even if tests fail so you can see what was missed
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-aggregate-report
          path: reports/aggregate-report/target/site/jacoco-aggregate/
          retention-days: 7

      # 5. Upload SpotBugs Report (if any bugs were found)
      - name: Upload SpotBugs Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: "**/target/spotbugsXml.xml"