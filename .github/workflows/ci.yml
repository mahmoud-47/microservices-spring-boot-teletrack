name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          
      - name: Install parent POM and common-utils to local Maven repo
        run: |
          mvn clean install -DskipTests -N
          cd common-utils
          mvn clean install -DskipTests
          cd ..

      - name: Install common-utils to local Maven repo
        run: |
          cd shared/common-utils
          mvn clean install -DskipTests
          cd ../..

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─────────────────────────────────────────────
      # BUILD JAVA SERVICES
      # ─────────────────────────────────────────────

      - name: Build Gateway
        run: |
          cd gateway/api-gateway
          mvn clean package -DskipTests
          cd ../..
          docker build -t mahmoudmhd47/teletrack-ms-gateway:latest ./gateway/api-gateway
          docker push mahmoudmhd47/teletrack-ms-gateway:latest

      - name: Build Discovery Service
        run: |
          cd discovery/discovery-service
          mvn clean package -DskipTests
          cd ../..
          docker build -t mahmoudmhd47/teletrack-ms-discovery:latest ./discovery/discovery-service
          docker push mahmoudmhd47/teletrack-ms-discovery:latest

      - name: Build Config Service
        run: |
          cd config/config-service
          mvn clean package -DskipTests
          cd ../..
          docker build -t mahmoudmhd47/teletrack-ms-config:latest ./config/config-service
          docker push mahmoudmhd47/teletrack-ms-config:latest

      - name: Build User Service
        run: |
          cd services/user-service
          mvn clean package -DskipTests
          cd ../..
          docker build -t mahmoudmhd47/teletrack-ms-user-service:latest ./services/user-service
          docker push mahmoudmhd47/teletrack-ms-user-service:latest

      - name: Build Incident Service
        run: |
          cd services/incident-service
          mvn clean package -DskipTests
          cd ../..
          docker build -t mahmoudmhd47/teletrack-ms-incident-service:latest ./services/incident-service
          docker push mahmoudmhd47/teletrack-ms-incident-service:latest

      - name: Build Notification Service
        run: |
          cd services/notification-service
          mvn clean package -DskipTests
          cd ../..
          docker build -t mahmoudmhd47/teletrack-ms-notification-service:latest ./services/notification-service
          docker push mahmoudmhd47/teletrack-ms-notification-service:latest

      - name: Build Reporting Service
        run: |
          cd services/reporting-service
          mvn clean package -DskipTests
          cd ../..
          docker build -t mahmoudmhd47/teletrack-ms-reporting-service:latest ./services/reporting-service
          docker push mahmoudmhd47/teletrack-ms-reporting-service:latest

      # ─────────────────────────────────────────────
      # BUILD PYTHON AI SERVICE
      # ─────────────────────────────────────────────

      - name: Build AI Service
        run: |
          docker build -t mahmoudmhd47/teletrack-ms-ai-service:latest ./AI-Service
          docker push mahmoudmhd47/teletrack-ms-ai-service:latest