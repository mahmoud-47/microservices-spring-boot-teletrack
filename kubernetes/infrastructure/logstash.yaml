apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: teletrack360
data:
  logstash.conf: |
    input {
      tcp {
        port => 5000
        codec => json_lines
      }
    }

    filter {
      date {
        match => ["@timestamp", "ISO8601"]
        target => "@timestamp"
      }
      mutate {
        remove_field => ["host", "port"]
      }
    }

    output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "teletrack-%{[service]}-%{+YYYY.MM.dd}"
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: teletrack360
spec:
  selector:
    app: logstash
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: teletrack360
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      initContainers:
        - name: wait-for-elasticsearch
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://elasticsearch:9200/_cluster/health 2>/dev/null | grep -q '"status"'; do
                echo "Waiting for Elasticsearch..."; sleep 5
              done
      containers:
        - name: logstash
          image: logstash:8.13.0
          env:
            - name: LS_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: logstash-config
