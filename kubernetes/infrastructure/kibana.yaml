apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: teletrack360
spec:
  selector:
    app: kibana
  ports:
    - port: 5601
      targetPort: 5601
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: teletrack360
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      initContainers:
        - name: wait-for-elasticsearch
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://elasticsearch:9200/_cluster/health 2>/dev/null | grep -q '"status"'; do
                echo "Waiting for Elasticsearch..."; sleep 5
              done
      containers:
        - name: kibana
          image: kibana:8.13.0
          env:
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch:9200
          ports:
            - containerPort: 5601
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
