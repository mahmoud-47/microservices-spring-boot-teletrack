apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: teletrack360
spec:
  selector:
    app: notification-service
  ports:
    - port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: teletrack360
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo "Waiting for Postgres..."; sleep 2; done
        - name: wait-for-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://config-service:8888/actuator/health 2>/dev/null | grep -q UP; do
                echo "Waiting for config-service..."; sleep 5
              done
      containers:
        - name: notification-service
          image: mahmoudmhd47/teletrack-ms-notification-service:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: teletrack-secrets
          env:
            - name: SPRING_CONFIG_IMPORT
              value: configserver:http://config-service:8888
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-service:8761/eureka/
            - name: NOTIFICATION_DB_URL
              value: jdbc:postgresql://postgres:5432/notification_db
            - name: NOTIFICATION_DB_USERNAME
              value: postgres
            - name: NOTIFICATION_DB_PASSWORD
              value: postgres
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: TRACING_URL
              value: http://jaeger:4317
            - name: MAIL_HOST
              value: smtp.gmail.com
            - name: MAIL_PORT
              value: "587"
            - name: HIKARI_MAX_POOL_SIZE
              value: "10"
            - name: HIKARI_MIN_IDLE
              value: "5"
            - name: HIKARI_IDLE_TIMEOUT
              value: "600000"
            - name: HIKARI_CONNECTION_TIMEOUT
              value: "30000"
            - name: HIKARI_MAX_LIFETIME
              value: "1800000"
            - name: HIKARI_LEAK_DETECTION_THRESHOLD
              value: "2000"
            - name: EXECUTOR_CORE_SIZE
              value: "5"
            - name: EXECUTOR_MAX_SIZE
              value: "20"
            - name: EXECUTOR_QUEUE_CAPACITY
              value: "500"
            - name: EXECUTOR_KEEP_ALIVE
              value: 60s
            - name: TOMCAT_MAX_THREADS
              value: "200"
            - name: TOMCAT_MIN_SPARE_THREADS
              value: "10"
            - name: TOMCAT_ACCEPT_COUNT
              value: "100"
            - name: TOMCAT_MAX_CONNECTIONS
              value: "8192"
            - name: LOGSTASH_HOST
              value: logstash
            - name: LOGSTASH_PORT
              value: "5000"
          ports:
            - containerPort: 8083
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
