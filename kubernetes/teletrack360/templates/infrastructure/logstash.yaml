apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: logstash
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      initContainers:
        - name: wait-for-elasticsearch
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://elasticsearch:9200/_cluster/health 2>/dev/null | grep -v '"status":"red"'; do
                echo "Waiting for Elasticsearch..."; sleep 10
              done
              echo "Elasticsearch is ready"
      containers:
        - name: logstash
          image: logstash:8.13.0
          imagePullPolicy: IfNotPresent
          env:
            - name: LS_JAVA_OPTS
              value: {{ .Values.logstash.javaOpts | quote }}
          ports:
            - containerPort: 5000
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: logstash-config
