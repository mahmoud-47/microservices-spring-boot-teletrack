apiVersion: v1
kind: Service
metadata:
  name: discovery-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: discovery-service
  ports:
    - port: 8761
      targetPort: 8761
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.services.discovery.replicas }}
  selector:
    matchLabels:
      app: discovery-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: discovery-service
    spec:
      containers:
        - name: discovery-service
          image: {{ .Values.services.discovery.image }}:{{ .Values.services.discovery.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            - name: TRACING_URL
              value: "http://jaeger:4317"
            - name: LOGSTASH_HOST
              value: "logstash"
            - name: LOGSTASH_PORT
              value: "5000"
          ports:
            - containerPort: 8761
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 8
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
