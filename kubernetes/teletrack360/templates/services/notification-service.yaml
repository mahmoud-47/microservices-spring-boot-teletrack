apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: notification-service
  ports:
    - port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.services.notificationService.replicas }}
  selector:
    matchLabels:
      app: notification-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for Postgres..."; sleep 2
              done
              echo "Postgres is ready"
        - name: wait-for-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://config-service:8888/actuator/health 2>/dev/null | grep UP; do
                echo "Waiting for config-service..."; sleep 5
              done
              echo "Config service is ready"
      containers:
        - name: notification-service
          image: {{ .Values.services.notificationService.image }}:{{ .Values.services.notificationService.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          envFrom:
            - secretRef:
                name: teletrack-secrets
          env:
            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://config-service:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-service:8761/eureka/"
            - name: NOTIFICATION_DB_URL
              value: "jdbc:postgresql://postgres:5432/notification_db"
            - name: NOTIFICATION_DB_USERNAME
              value: {{ .Values.postgres.username | quote }}
            - name: NOTIFICATION_DB_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: TRACING_URL
              value: "http://jaeger:4317"
            - name: MAIL_HOST
              value: {{ .Values.mail.host | quote }}
            - name: MAIL_PORT
              value: {{ .Values.mail.port | quote }}
            - name: HIKARI_MAX_POOL_SIZE
              value: {{ .Values.hikari.maxPoolSize | quote }}
            - name: HIKARI_MIN_IDLE
              value: {{ .Values.hikari.minIdle | quote }}
            - name: HIKARI_IDLE_TIMEOUT
              value: {{ .Values.hikari.idleTimeout | quote }}
            - name: HIKARI_CONNECTION_TIMEOUT
              value: {{ .Values.hikari.connectionTimeout | quote }}
            - name: HIKARI_MAX_LIFETIME
              value: {{ .Values.hikari.maxLifetime | quote }}
            - name: HIKARI_LEAK_DETECTION_THRESHOLD
              value: {{ .Values.hikari.leakDetectionThreshold | quote }}
            - name: EXECUTOR_CORE_SIZE
              value: {{ .Values.executor.coreSize | quote }}
            - name: EXECUTOR_MAX_SIZE
              value: {{ .Values.executor.maxSize | quote }}
            - name: EXECUTOR_QUEUE_CAPACITY
              value: {{ .Values.executor.queueCapacity | quote }}
            - name: EXECUTOR_KEEP_ALIVE
              value: {{ .Values.executor.keepAlive | quote }}
            - name: TOMCAT_MAX_THREADS
              value: {{ .Values.tomcat.maxThreads | quote }}
            - name: TOMCAT_MIN_SPARE_THREADS
              value: {{ .Values.tomcat.minSpareThreads | quote }}
            - name: TOMCAT_ACCEPT_COUNT
              value: {{ .Values.tomcat.acceptCount | quote }}
            - name: TOMCAT_MAX_CONNECTIONS
              value: {{ .Values.tomcat.maxConnections | quote }}
            - name: LOGSTASH_HOST
              value: "logstash"
            - name: LOGSTASH_PORT
              value: "5000"
          ports:
            - containerPort: 8083
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: {{ .Values.spread.topologyKey }}
          whenUnsatisfiable: {{ .Values.spread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app: notification-service
