apiVersion: v1
kind: Service
metadata:
  name: reporting-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: reporting-service
  ports:
    - port: 8084
      targetPort: 8084
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.services.reportingService.replicas }}
  selector:
    matchLabels:
      app: reporting-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: reporting-service
    spec:
      initContainers:
        - name: wait-for-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://config-service:8888/actuator/health 2>/dev/null | grep UP; do
                echo "Waiting for config-service..."; sleep 5
              done
              echo "Config service is ready"
      containers:
        - name: reporting-service
          image: {{ .Values.services.reportingService.image }}:{{ .Values.services.reportingService.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          envFrom:
            - secretRef:
                name: teletrack-secrets
          env:
            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://config-service:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-service:8761/eureka/"
            - name: MONGO_USERNAME
              value: {{ .Values.mongo.username | quote }}
            - name: MONGO_PASSWORD
              value: {{ .Values.mongo.password | quote }}
            - name: MONGO_HOST
              value: "mongo"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: AI_SERVICE_URL
              value: "http://ai-service:8085"
            - name: TRACING_URL
              value: "http://jaeger:4317"
            - name: EXECUTOR_CORE_SIZE
              value: {{ .Values.executor.coreSize | quote }}
            - name: EXECUTOR_MAX_SIZE
              value: {{ .Values.executor.maxSize | quote }}
            - name: EXECUTOR_QUEUE_CAPACITY
              value: {{ .Values.executor.queueCapacity | quote }}
            - name: EXECUTOR_KEEP_ALIVE
              value: {{ .Values.executor.keepAlive | quote }}
            - name: TOMCAT_MAX_THREADS
              value: {{ .Values.tomcat.maxThreads | quote }}
            - name: TOMCAT_MIN_SPARE_THREADS
              value: {{ .Values.tomcat.minSpareThreads | quote }}
            - name: TOMCAT_ACCEPT_COUNT
              value: {{ .Values.tomcat.acceptCount | quote }}
            - name: TOMCAT_MAX_CONNECTIONS
              value: {{ .Values.tomcat.maxConnections | quote }}
            - name: LOGSTASH_HOST
              value: "logstash"
            - name: LOGSTASH_PORT
              value: "5000"
          ports:
            - containerPort: 8084
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: {{ .Values.spread.topologyKey }}
          whenUnsatisfiable: {{ .Values.spread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app: reporting-service
