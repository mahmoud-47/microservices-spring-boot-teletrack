apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
  annotations:
    # AWS NLB annotation — ignored by minikube
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.services.gateway.replicas }}
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://config-service:8888/actuator/health 2>/dev/null | grep UP; do
                echo "Waiting for config-service..."; sleep 5
              done
              echo "Config service is ready"
      containers:
        - name: api-gateway
          image: {{ .Values.services.gateway.image }}:{{ .Values.services.gateway.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          envFrom:
            - secretRef:
                name: teletrack-secrets
          env:
            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://config-service:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-service:8761/eureka/"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: TRACING_URL
              value: "http://jaeger:4317"
            - name: FRONT_URL
              value: {{ .Values.gateway.frontUrl | quote }}
            - name: BACK_URL
              value: {{ .Values.gateway.backUrl | quote }}
            - name: LOGSTASH_HOST
              value: "logstash"
            - name: LOGSTASH_PORT
              value: "5000"
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: {{ .Values.spread.topologyKey }}
          whenUnsatisfiable: {{ .Values.spread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app: api-gateway
