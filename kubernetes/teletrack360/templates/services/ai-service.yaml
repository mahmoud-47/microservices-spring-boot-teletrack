apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: ai-service
  ports:
    - port: 8085
      targetPort: 8085
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.services.aiService.replicas }}
  selector:
    matchLabels:
      app: ai-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: {{ .Values.services.aiService.image }}:{{ .Values.services.aiService.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          envFrom:
            - secretRef:
                name: teletrack-secrets
          ports:
            - containerPort: 8085
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
